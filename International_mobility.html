        color: #fff;
        font-weight: bold;
        box-shadow: 0 4px 12px rgba(30,71,61,0.13);
    }
    .tab-btn:hover:not(.active) {
        background: #3e7c6b;
        color: #fff;
    }
    .tab-content {
        display: none;
        animation: fadeIn 0.5s;
    }
    .tab-content.active {
        display: block;
        animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 600px) {
        main { padding: 1.2rem 0.5rem; }
        .tab-bar { flex-direction: column; gap: 0.5rem; }
